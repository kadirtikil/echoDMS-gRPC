services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: echo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  server:
    ports:
      - "50051:50051"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5433/echo?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./certs/ca.crt:/app/certs/ca.crt:ro
      - ./certs/server.crt:/app/certs/server.crt:ro
      - ./certs/server.key:/app/certs/server.key:ro

volumes:
  pgdata: