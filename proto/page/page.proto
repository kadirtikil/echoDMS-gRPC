syntax = "proto3";

package page;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/echoDMS/proto/page";

// --- Page message and related request/response messages ---
message Page {
  string id = 1;
  string document_id = 2;
  string content = 3;
  int32 sort_order = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// --- Page Request/Response messages ---
message GetPageRequest {
  string id = 1;
}

// PaginatePagesRequest is used to request a paginated list of pages for a specific document.
message PaginatePagesRequest {
  string document_id = 1;
  int32 page_number = 2;
  int32 page_size = 3;
}

// PaginatePagesResponse contains a list of pages for the requested page number and size.
message PaginatePagesResponse {
  repeated Page pages = 1;
}

// CreatePageRequest is used to create a new page within a document.
message CreatePageRequest {
  string document_id = 1;
  string content = 2;
  int32 sort_order = 3;
}

// UpdatePageRequest is used to update the content or sort order of an existing page.
message UpdatePageRequest {
  string id = 1;
  string content = 2;
  int32 sort_order = 3;
}

// DeletePageRequest is used to delete a page by its ID.
message DeletePageRequest {
  string id = 1;
}

// PageService defines the gRPC service for managing pages within documents.
service PageService {
  // CreatePage creates a new page within a document.
  rpc CreatePage(CreatePageRequest) returns (Page);
  // GetPage retrieves a page by its ID.
  rpc GetPage(GetPageRequest) returns (Page);
  // PaginatePages retrieves a paginated list of pages for a specific document.
  rpc PaginatePages(PaginatePagesRequest) returns (PaginatePagesResponse);
  // UpdatePage updates the content or sort order of a page.
  rpc UpdatePage(UpdatePageRequest) returns (Page);
  // DeletePage deletes a page by its ID.
  rpc DeletePage(DeletePageRequest) returns (google.protobuf.Empty);
}
